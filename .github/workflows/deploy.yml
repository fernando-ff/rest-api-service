name: Deploy Quarkus to OCI Free Tier

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # =========================================================
  # JOB 1: Testes Unitários e de Integração (JVM Rápida)
  # =========================================================
  unit-tests:
    name: 1. Run Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up GraalVM for Testing
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '21'
        distribution: 'graalvm'
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Run Maven Tests
      run: ./mvnw test

  # =========================================================
  # JOB 2: Build Nativo GraalVM
  # =========================================================
  native-build:
    name: 2. Build Native Executable
    needs: unit-tests # Só roda se os testes passarem!
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up GraalVM For Native Compilation
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '21'
        distribution: 'graalvm'
        github-token: ${{ secrets.GITHUB_TOKEN }}
        native-image-job-reports: 'true'

    # Gera o executável nativo sem reexecutar os testes
    - name: Build Native Executable with Maven
      run: ./mvnw package -Dnative -DskipTests -Dquarkus.native.container-build=false

    # Salva o binário nativo como artefato para o Job 3 usar
    - name: Upload Native Runner Artifact
      uses: actions/upload-artifact@v4
      with:
        name: native-runner
        path: target/*-runner
        retention-days: 1

  # =========================================================
  # JOB 3: Deploy na Oracle Cloud Infrastructure (OCI)
  # =========================================================
  deploy:
    name: 3. Deploy to OCI
    needs: native-build # Só roda se o build nativo tiver sucesso!
    runs-on: ubuntu-latest

    steps:
    # Baixa o binário nativo compilado no Job 2
    - name: Download Native Runner Artifact
      uses: actions/download-artifact@v4
      with:
        name: native-runner
        path: target

    # Copia o binário baixado para a OCI via SCP
    - name: Copy Executable to OCI Instance
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.OCI_HOST_IP }}
        username: ubuntu
        key: ${{ secrets.OCI_SSH_KEY }}
        source: "target/*-runner"
        target: "~/app"
        strip_components: 1

    # Conecta via SSH para escrever a config, parar a versão antiga e reiniciar
    - name: Execute Remote Deployment Commands
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.OCI_HOST_IP }}
        username: ubuntu
        key: ${{ secrets.OCI_SSH_KEY }}
        script: |
          mkdir -p ~/app
          cd ~/app
          
          # 1. Escreve o JSON de Workload Identity a partir do Secret
          cat << 'EOF' > google-workload-config.json
          ${{ secrets.GOOGLE_WORKLOAD_CONFIG }}
          EOF
          
          # 2. Garante permissão de execução no binário
          chmod +x *-runner
          
          # 3. Mata o processo antigo na porta 8080 (se existir)
          PID=$(lsof -t -i:8080)
          if [ -n "$PID" ]; then
            echo "Stopping older instance with PID: $PID"
            kill -15 $PID
            sleep 3
            kill -9 $PID 2>/devnull || true
          fi
          
          # 4. Inicia a nova versão injetando os Secrets de ambiente
          nohup env \
            GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            GOOGLE_CALENDAR_ID="${{ secrets.GOOGLE_CALENDAR_ID }}" \
            ./*-runner > app.log 2>&1 &
          
          echo "Deployment complete. Application logging redirected to app.log"